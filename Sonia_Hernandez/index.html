<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sonia Hernandez – Digital Card</title>

<!-- Fancy Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#5f72bd,#9b23ea);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #ffffff;
  width: 360px;
  padding: 28px 22px 24px;
  border-radius: 24px;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
}

/* Logo */
.logo-wrapper {
  position: relative;
  width: 140px;
  margin: 0 auto 16px;
}

.logo-wrapper img {
  width: 140px;
  display: block;
}

.logo-initials {
  position: absolute;
  bottom: -10px;
  right: -10px;
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
  color: #b58b2a;
  text-shadow: 0 3px 8px rgba(0,0,0,0.25);
}

/* Name */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 36px;
  margin: 6px 0 4px;
  color: #2c2c2c;
}

.subtitle {
  font-size: 16px;
  color: #555;
  margin-bottom: 6px;
}

.languages {
  font-size: 14px;
  color: #777;
  margin-bottom: 22px;
}

/* Buttons */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;

  width: 85%;
  margin: 10px auto;
  padding: 14px;

  border-radius: 999px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;

  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 18px rgba(0,0,0,0.18);
}

.btn img {
  height: 20px;
}

/* Button Colors */
.save {
  background: linear-gradient(135deg,#6a11cb,#2575fc);
  color: #fff;
}

.call {
  background: #1f1f1f;
  color: #fff;
}

.whatsapp {
  background: #25D366;
  color: #fff;
}

.email {
  background: #f3f3f3;
  color: #000;
  border: 1px solid #ddd;
}

.footer {
  margin-top: 18px;
  font-size: 12px;
  color: #888;
}

.footer a {
  color: #888;
  text-decoration: none;
  font-weight: 500;
}
</style>
</head>

<body>
<div class="card">

  <!-- Logo with Initials -->
  <div class="logo-wrapper">
    <img src="speech-logo.png" alt="Language Logo">
    <div class="logo-initials">SH</div>
  </div>

  <h1>Sonia Hernandez</h1>
  <div class="subtitle">Intérprete Profesional</div>
  <div class="languages">Francés · Inglés · Español · Portugués</div>

  <!-- Save Contact -->
  <a class="btn save" href="Sonia-Hernandez.vcf">
    <img src="../assets/user_icon.png" alt="">
    Guardar Contacto
  </a>

  <!-- Call -->
  <a class="btn call" href="tel:+573102263420">
    <img src="../assets/call_icon.jpg" alt="">
    Llamar +57 310 226 3420
  </a>

  <!-- WhatsApp -->
  <a class="btn whatsapp" href="https://wa.me/573102263420">
    <img src="../assets/whatsapp_icon.png" alt="">
    WhatsApp
  </a>

  <!-- Email -->
  <a class="btn email" href="mailto:soeher@gmail.com">
    <img src="../assets/Gmail_logo.png" alt="">
    Correo
  </a>

  <div class="footer">
    <a href="https://wa.me/50767317853">Powered by Digital Cards Panama</a>
  </div>

</div>
</body>
</html>
