<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samuel Sugasti – Tarjeta Digital</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #2b2b2b, #0f0f0f);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      width: 360px;
      padding: 26px 22px 22px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    .profile {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 6px 0 4px;
      font-size: 24px;
      font-weight: 700;
    }

    .title {
      font-size: 16px;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .slogan {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      font-style: italic;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 85%;
      margin: 10px auto;
      padding: 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    .btn img {
      height: 20px;
      width: auto;
    }

    .save {
      background: #2f6fed;
      color: #fff;
    }

    .call {
      background: #111;
      color: #fff;
    }

    .whatsapp {
      background: #25D366;
      color: #fff;
    }

    .email {
      background: #f3f3f3;
      color: #000;
      border: 1px solid #ddd;
    }

    .linkedin {
      background: #0A66C2;
      color: #fff;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #888;
    }

    .footer a {
      color: #888;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Profile Image -->
    <img src="Sam_Sugasti2.png" alt="Samuel Sugasti" class="profile"/>

    <h1>Samuel Sugasti</h1>
    <div class="title">El Preñador</div>
    <div class="slogan">"De que te preño, te preño" 👍</div>

    <!-- Guardar Contacto -->
    <a class="btn save" href="Samuel-Sugasti.vcf">
      <img src="../assets/user_icon.png" alt="">
      Guardar Contacto
    </a>

    <!-- Llamar -->
    <a class="btn call" href="tel:+50769493794">
      <img src="../assets/call_icon.jpg" alt="">
      Llamar
    </a>

    <!-- WhatsApp -->
    <a class="btn whatsapp" href="https://wa.me/50769493794">
      <img src="../assets/whatsapp_icon.png" alt="">
      WhatsApp
    </a>

    <!-- Correo -->
    <a class="btn email" href="mailto:drsam04@hotmail.com">
      <img src="../assets/e-mail.png" alt="">
      Correo
    </a>

    <!-- LinkedIn -->
    <a class="btn linkedin" href="https://www.linkedin.com/in/samuel-sugasti-26879852/" target="_blank">
      <img src="../assets/Linkedin_logo.png" alt="">
      LinkedIn
    </a>

    <div class="footer">
      <a href="https://wa.me/50767317853">Powered by Digital Cards Panama</a>
    </div>

  </div>
</body>
</html>
