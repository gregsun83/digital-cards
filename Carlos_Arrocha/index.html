<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carlos Arrocha – Tarjeta Digital</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: radial-gradient(circle at top, #2F8FBD, #1E6FA3);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #ffffff;
  width: 360px;
  padding: 0px 22px 22px;
  border-radius: 22px;
  text-align: center;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35);
}

/* Logo */
.logo {
  width: 220px;
  margin: 0 auto 6px;
  display: block;
}

/* Name */
h1 {
  margin: 2px 0 4px;
  font-size: 24px;
  font-weight: 700;
  color: #1E6FA3;
}

/* Subtitle */
.subtitle {
  font-size: 14px;
  color: #555;
  margin-bottom: 14px;
  line-height: 1.4;
}

/* Info */
.info {
  font-size: 14px;
  color: #444;
  margin-bottom: 18px;
  line-height: 1.5;
}

/* Buttons */
.btn {
  display: flex;
  align-items: center;
  width: 85%;
  margin: 8px auto;
  padding: 14px 20px;
  border-radius: 999px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  position: relative;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(0,0,0,0.18);
}

/* Icon locked to left */
.btn img {
  width: 20px;
  height: 20px;
  object-fit: contain;
  position: absolute;
  left: 20px;
}

/* Text centered */
.btn span {
  width: 100%;
  text-align: center;
}

/* Button colors */
.save {
  background: linear-gradient(45deg,#2F8FBD,#1E6FA3);
  color: #fff;
}

.call {
  background: #1E6FA3;
  color: #fff;
}

.whatsapp {
  background: #25D366;
  color: #fff;
}

.email {
  background: #f3f3f3;
  color: #000;
  border: 1px solid #ddd;
}

.footer {
  margin-top: 16px;
  font-size: 12px;
  color: #888;
}

.footer a {
  color: #888;
  text-decoration: none;
  font-weight: 500;
}
</style>
</head>

<body>
<div class="card">

<img src="Carlos-Arrocha-Logo.png" alt="Carlos Arrocha Logo" class="logo">

<h1>Carlos Arrocha</h1>

<div class="subtitle">
Cirugía General - Laparoscopia<br>
Cirugía Hepatobiliar y Trasplante Hepático
</div>

<div class="info">
Hospital San Fernando<br>
Primer piso - Consultorio Sur
</div>

<a class="btn save" href="Carlos-Arrocha.vcf">
<img src="../assets/user_icon.png" alt="">
<span>Guardar Contacto</span>
</a>

<a class="btn call" href="tel:3056361">
<img src="../assets/call_icon.jpg" alt="">
<span>Llamar 305-6361</span>
</a>

<a class="btn call" href="tel:66676809">
<img src="../assets/call_icon.jpg" alt="">
<span>Llamar 6667-6809</span>
</a>

<span>WhatsApp</span>
</a>
