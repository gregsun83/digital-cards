<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carlos Arrocha – Tarjeta Digital</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #2F8FBD, #1E6FA3);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #ffffff;
      width: 360px;
      padding: 28px 22px 22px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
    }

    /* Bigger logo */
    .logo {
      width: 300px;
      margin: 10px auto 18px;
      display: block;
    }

    h1 {
      margin: 6px 0 4px;
      font-size: 24px;
      font-weight: 700;
      color: #1E6FA3;
    }

    .subtitle {
      font-size: 14px;
      color: #555;
      margin-bottom: 18px;
      line-height: 1.4;
    }

    .info {
      font-size: 14px;
      color: #444;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 85%;
      margin: 10px auto;
      padding: 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18);
    }

    .btn img {
      height: 18px;
      width: auto;
    }

    .icon-wide {
      width: 20px;
      height: auto;
    }

    .save {
      background: linear-gradient(45deg,#2F8FBD,#1E6FA3);
      color: #fff;
    }

    .call {
      background: #1E6FA3;
      color: #fff;
    }

    .whatsapp {
      background: #25D366;
      color: #fff;
    }

    .email {
      background: #f3f3f3;
      color: #000;
      border: 1px solid #ddd;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #888;
    }

    .footer a {
      color: #888;
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <div class="card">

    <!-- Logo -->
    <img src="Carlos-Arrocha-Logo.png" alt="Carlos Arrocha Logo" class="logo"/>

    <h1>Carlos Arrocha</h1>

    <div class="subtitle">
      Cirugía General - Laparoscopia<br>
      Cirugía Hepatobiliar y Trasplante Hepático
    </div>

    <div class="info">
      Hospital San Fernando<br>
      Primer piso - Consultorio Sur
    </div>

    <!-- Guardar Contacto -->
    <a class="btn save" href="Carlos-Arrocha.vcf">
      <img src="../assets/user_icon.png" class="icon-wide" alt="">
      Guardar Contacto
    </a>

    <!-- Llamar fijo -->
    <a class="btn call" href="tel:3056361">
      <img src="../assets/call_icon.jpg" alt="">
      Llamar 305-6361
    </a>

    <!-- Llamar móvil -->
    <a class="btn call" href="tel:66676809">
      <img src="../assets/call_icon.jpg" alt="">
      Llamar 6667-6809
    </a>

    <!-- WhatsApp -->
    <a class="btn whatsapp" href="https://wa.me/50766676809">
      <img src="../assets/whatsapp_icon.png" alt="">
      WhatsApp
    </a>

    <!-- Email -->
    <a class="btn email" href="mailto:carlosarrocha03@gmail.com">
      <img src="../assets/Gmail_logo.png" class="icon-wide" alt="">
      Correo
    </a>

    <div class="footer">
      <a href="https://wa.me/50767317853">Powered by Digital Cards Panama</a>
    </div>

  </div>
</body>
</html>
